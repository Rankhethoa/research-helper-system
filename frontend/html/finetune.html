<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Topic Generator </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">


<link rel="stylesheet" type="text/css" href="../css/style.css">
<link rel="stylesheet" type="text/css" href="../css/topicGenerator.css">
</head>

<body>

<!-- Header -->
<header>
  <a class="logo" href="../../index.html">
    <span class="logo-icon">✦</span>
    <em>My Research Helper</em>
  </a>
  <a class="back-btn" href="../../index.html">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
    Back to Search
  </a>
</header>

<!-- Page hero -->
<section class="page-hero">
  <div class="page-hero-badge"><span class="dot"></span> AI-Powered</div>
  <h1 class="page-title">Narrow <em>Your</em> Topic</h1>
  <p class="page-sub">Input your research topic — we'll give you a narrow and more-refined version.</p>
</section>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-ring"></div>
  <div class="loading-text">Generating your newly refined research topic…</div>
  <div class="loading-sub" id="loadingStatus">Consulting the literature</div>
</div>

<div class="page-body">

  <!-- Form card -->
  <div class="form-card">

    <!-- Step 1: Details -->
    <div class="form-section-title" style="margin-top:1.75rem">
      <span class="step-num">1</span> Enter your topic
    </div>
    <div class="form-row">
        <label class="form-label">Research topic <span class="required"></span></label>
        <input class="form-input" type="text" id="subfield" placeholder="e.g. Effects of drugs on teenagers">
      </div>

    </div>

    <div style="margin-top: 1.75rem">
      <button class="generate-btn" id="generateBtn" onclick="refineTopic()">
        <span id="btnSpinnerEl" class="btn-spinner"></span>
        <svg id="btnIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span id="btnText">Fine-tune Research Topic</span>
      </button>
      <div class="error-box" id="errorBox"></div>
    </div>
  

  <!-- Result Panel -->
  <div class="result-card" id="resultCard" style="display:none;">
    <h3>Refined Topic</h3>
    <p id="refinedTopic"></p>
  
    <div id="variations"></div> 
    <div id="gapBlock"></div>
    <div id="methodBlock"></div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Recent generations
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<script src="../js/finetune.js"></script> 



</body>
</html>
